name: CI

# Validates every formula on each PR and push to main, so a malformed or
# non-conforming formula fails review instead of a `brew install`. Uses the
# Homebrew that GitHub's runner images ship preinstalled, so no third-party
# setup action is needed (org actions allowlist: GitHub- and Glyndor-owned only).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  formulae:
    name: brew style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate formulae with the preinstalled Homebrew
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # `brew style` (rubocop under the hood) accepts file paths and catches
          # formatting and deprecated-API issues — a sufficient gate for these
          # generated formulae. `brew audit --strict` is deliberately not run
          # here: it must load the formula's active spec, but the macOS binaries
          # live inside an `on_macos` block that a Linux runner never evaluates,
          # so audit reports "requires at least a URL". Auditing needs a macOS
          # runner and is tracked as a follow-up.
          brew style Formula/*.rb
