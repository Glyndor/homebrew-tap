name: CI

# Validates every formula on each PR and push to main, so a malformed or
# non-conforming formula fails review instead of a `brew install`. Uses the
# Homebrew that GitHub's runner images ship preinstalled, so no third-party
# setup action is needed (org actions allowlist: GitHub- and Glyndor-owned only).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  formulae:
    name: brew style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate formulae with the preinstalled Homebrew
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # `brew style` (rubocop under the hood) accepts file paths and catches
          # formatting and deprecated-API issues. It runs on Linux because it
          # parses the formula rather than resolving it, so it needs no macOS
          # runner and keeps the fast feedback on every push. The deeper
          # `brew audit --strict` cannot run here — it resolves the active spec,
          # and the binaries live in an `on_macos` block a Linux runner never
          # evaluates — so it runs in the `brew audit` job below instead.
          brew style Formula/*.rb

  audit:
    name: brew audit
    runs-on: macos-latest
    env:
      # Keep the run deterministic and offline: no auto-update mid-job, and no
      # analytics ping (the org ships and runs nothing that phones home).
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ANALYTICS: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Audit formulae as an installed tap
        run: |
          set -euo pipefail
          # `brew audit --tap` only accepts a tap Homebrew knows about, and a tap
          # is just a checkout in the right place under Library/Taps. Linking the
          # workspace in is what makes the PR's own formulae the ones audited —
          # `brew tap glyndor/tap` would fetch the published main branch instead
          # and pass while the change under review is broken.
          tap_dir="$(brew --repository)/Library/Taps/glyndor/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"

          # Name every formula explicitly instead of passing `--tap`. Selecting
          # by tap means a link that silently resolved to nothing audits an
          # empty set and still exits 0 — a green gate that checked no formula,
          # the same failure as a required check no job emits. Named formulae
          # make that case fail loudly with "No available formula".
          shopt -s nullglob
          names=()
          for formula in Formula/*.rb; do
            names+=("glyndor/tap/$(basename "$formula" .rb)")
          done
          if [ ${#names[@]} -eq 0 ]; then
            echo "::error::no formulae found under Formula/ — the tap is empty or the checkout is wrong"
            exit 1
          fi
          echo "auditing: ${names[*]}"

          # No `--online`: the URL and homepage reachability checks would make
          # this gate depend on the network and on GitHub's release endpoints,
          # and a formula must not go red because a host blipped. The signed
          # SHA256SUMS the generator verifies is what proves the assets, not a
          # HEAD request from CI.
          brew audit --strict "${names[@]}"
