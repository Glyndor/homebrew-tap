name: CI

# Validates every formula on each PR and push to main, so a malformed or
# non-conforming formula fails review instead of a `brew install`. Uses the
# Homebrew that GitHub's runner images ship preinstalled, so no third-party
# setup action is needed (org actions allowlist: GitHub- and Glyndor-owned only).
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  formulae:
    name: brew style + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate formulae with the preinstalled Homebrew
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          # `brew style` accepts file paths and enforces the formula style guide
          # (rubocop under the hood).
          brew style Formula/*.rb
          # `brew audit` no longer accepts file paths — it audits formulae by tap.
          # Link the checkout in as the `glyndor/tap` tap so audit can see the
          # formulae by name, then run the strict field/consistency checks.
          tap_dir="$(brew --repository)/Library/Taps/glyndor/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sfn "$GITHUB_WORKSPACE" "$tap_dir"
          brew audit --strict --tap=glyndor/tap
